<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sphere" cx="36%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#c8f5f8"/>
      <stop offset="25%"  stop-color="#0ab5bd"/>
      <stop offset="70%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#044d52"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0ab5bd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0ab5bd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Anel externo -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#0ab5bd" stroke-width="1.2" opacity="0.6"/>

  <!-- Nós externos teal -->
  <g fill="none" stroke="#0ab5bd" stroke-width="1.5">
    <circle cx="100" cy="10"  r="4.5"/>
    <circle cx="172" cy="50"  r="4.5"/>
    <circle cx="185" cy="130" r="4.5"/>
    <circle cx="130" cy="185" r="4.5"/>
    <circle cx="30"  cy="165" r="4.5"/>
    <circle cx="18"  cy="75"  r="4.5"/>
  </g>
  <!-- Nós externos dark -->
  <g fill="none" stroke="#1e6b7a" stroke-width="1.5">
    <circle cx="155" cy="18"  r="4"/>
    <circle cx="182" cy="90"  r="4"/>
    <circle cx="155" cy="175" r="4"/>
    <circle cx="55"  cy="185" r="4"/>
    <circle cx="16"  cy="115" r="4"/>
    <circle cx="42"  cy="22"  r="4"/>
  </g>
  <!-- Pontos dos nós -->
  <g fill="#0ab5bd">
    <circle cx="100" cy="10"  r="2"/>
    <circle cx="172" cy="50"  r="2"/>
    <circle cx="185" cy="130" r="2"/>
    <circle cx="130" cy="185" r="2"/>
    <circle cx="30"  cy="165" r="2"/>
    <circle cx="18"  cy="75"  r="2"/>
  </g>
  <g fill="#1e6b7a">
    <circle cx="155" cy="18"  r="1.8"/>
    <circle cx="182" cy="90"  r="1.8"/>
    <circle cx="155" cy="175" r="1.8"/>
    <circle cx="55"  cy="185" r="1.8"/>
    <circle cx="16"  cy="115" r="1.8"/>
    <circle cx="42"  cy="22"  r="1.8"/>
  </g>

  <!-- Linhas teal (principais) -->
  <g stroke="#0ab5bd" stroke-width="1.6" fill="none" opacity="0.8" stroke-linecap="round">
    <line x1="100" y1="10"  x2="108" y2="58"/>
    <line x1="172" y1="50"  x2="148" y2="72"/>
    <line x1="185" y1="130" x2="148" y2="116"/>
    <line x1="130" y1="185" x2="118" y2="148"/>
    <line x1="30"  y1="165" x2="62"  y2="140"/>
    <line x1="18"  y1="75"  x2="56"  y2="90"/>
    <line x1="108" y1="58"  x2="148" y2="72"/>
    <line x1="148" y1="116" x2="118" y2="148"/>
    <line x1="62"  y1="140" x2="56"  y2="90"/>
  </g>

  <!-- Linhas dark navy (contraste) -->
  <g stroke="#1a4a5e" stroke-width="2.2" fill="none" opacity="0.9" stroke-linecap="round">
    <line x1="155" y1="18"  x2="148" y2="72"/>
    <line x1="182" y1="90"  x2="148" y2="72"/>
    <line x1="182" y1="90"  x2="148" y2="116"/>
    <line x1="155" y1="175" x2="118" y2="148"/>
    <line x1="55"  y1="185" x2="62"  y2="140"/>
    <line x1="16"  y1="115" x2="56"  y2="90"/>
    <line x1="42"  y1="22"  x2="56"  y2="90"/>
    <line x1="108" y1="58"  x2="56"  y2="90"/>
    <line x1="148" y1="72"  x2="148" y2="116"/>
    <line x1="62"  y1="140" x2="118" y2="148"/>
  </g>

  <!-- Nós internos -->
  <g fill="none" stroke="#0ab5bd" stroke-width="1.2" opacity="0.7">
    <circle cx="108" cy="58"  r="3.5"/>
    <circle cx="148" cy="72"  r="3.5"/>
    <circle cx="148" cy="116" r="3.5"/>
    <circle cx="118" cy="148" r="3.5"/>
    <circle cx="62"  cy="140" r="3.5"/>
    <circle cx="56"  cy="90"  r="3.5"/>
  </g>
  <g fill="#0ab5bd" opacity="0.9">
    <circle cx="108" cy="58"  r="2"/>
    <circle cx="148" cy="72"  r="2"/>
    <circle cx="148" cy="116" r="2"/>
    <circle cx="118" cy="148" r="2"/>
    <circle cx="62"  cy="140" r="2"/>
    <circle cx="56"  cy="90"  r="2"/>
  </g>

  <!-- Halo glow central -->
  <circle cx="100" cy="100" r="42" fill="url(#glow)"/>

  <!-- Esfera central -->
  <circle cx="100" cy="100" r="28" fill="url(#sphere)"/>
  <!-- Highlight 3D -->
  <ellipse cx="91" cy="91" rx="9" ry="6" fill="white" opacity="0.30" transform="rotate(-15 91 91)"/>
  <ellipse cx="93" cy="93" rx="5" ry="3" fill="white" opacity="0.18" transform="rotate(-15 93 93)"/>
</svg>
