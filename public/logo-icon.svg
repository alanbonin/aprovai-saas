<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sphere" cx="34%" cy="28%" r="70%">
      <stop offset="0%"  stop-color="#b0f0f5"/>
      <stop offset="40%" stop-color="#0ab5bd"/>
      <stop offset="100%" stop-color="#044d52"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0ab5bd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0ab5bd" stop-opacity="0"/>
    </radialGradient>
    <!-- Asas: teal médio — legível no fundo #050511 do site -->
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a8c99"/>
      <stop offset="55%"  stop-color="#0d6370"/>
      <stop offset="100%" stop-color="#053c44"/>
    </linearGradient>
  </defs>

  <!-- Anel externo fino -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#0ab5bd" stroke-width="1.5" opacity="0.7"/>

  <!-- 12 nós distribuídos a cada 30° (r=88) -->
  <!-- fórmula: x=100+88*sin(a), y=100-88*cos(a) -->
  <g stroke="#0ab5bd" stroke-width="1.4" fill="none" opacity="0.85">
    <circle cx="100.0" cy="12.0" r="4"/>   <!-- 0°   -->
    <circle cx="144.0" cy="22.0" r="4"/>   <!-- 30°  -->
    <circle cx="176.2" cy="56.0" r="4"/>   <!-- 60°  -->
    <circle cx="188.0" cy="100.0" r="4"/>  <!-- 90°  -->
    <circle cx="176.2" cy="144.0" r="4"/>  <!-- 120° -->
    <circle cx="144.0" cy="178.0" r="4"/>  <!-- 150° -->
    <circle cx="100.0" cy="188.0" r="4"/>  <!-- 180° -->
    <circle cx="56.0"  cy="178.0" r="4"/>  <!-- 210° -->
    <circle cx="23.8"  cy="144.0" r="4"/>  <!-- 240° -->
    <circle cx="12.0"  cy="100.0" r="4"/>  <!-- 270° -->
    <circle cx="23.8"  cy="56.0"  r="4"/>  <!-- 300° -->
    <circle cx="56.0"  cy="22.0"  r="4"/>  <!-- 330° -->
  </g>
  <!-- Pontos centrais dos nós -->
  <g fill="#0ab5bd">
    <circle cx="100.0" cy="12.0"  r="1.8"/>
    <circle cx="144.0" cy="22.0"  r="1.8"/>
    <circle cx="176.2" cy="56.0"  r="1.8"/>
    <circle cx="188.0" cy="100.0" r="1.8"/>
    <circle cx="176.2" cy="144.0" r="1.8"/>
    <circle cx="144.0" cy="178.0" r="1.8"/>
    <circle cx="100.0" cy="188.0" r="1.8"/>
    <circle cx="56.0"  cy="178.0" r="1.8"/>
    <circle cx="23.8"  cy="144.0" r="1.8"/>
    <circle cx="12.0"  cy="100.0" r="1.8"/>
    <circle cx="23.8"  cy="56.0"  r="1.8"/>
    <circle cx="56.0"  cy="22.0"  r="1.8"/>
  </g>

  <!-- Linhas nó → zona interna -->
  <g stroke="#0ab5bd" stroke-width="1.2" opacity="0.55" stroke-linecap="round">
    <line x1="100.0" y1="12.0"  x2="100" y2="62"/>
    <line x1="144.0" y1="22.0"  x2="122" y2="60"/>
    <line x1="176.2" y1="56.0"  x2="140" y2="78"/>
    <line x1="188.0" y1="100.0" x2="138" y2="100"/>
    <line x1="176.2" y1="144.0" x2="140" y2="122"/>
    <line x1="144.0" y1="178.0" x2="122" y2="140"/>
    <line x1="100.0" y1="188.0" x2="100" y2="138"/>
    <line x1="56.0"  y1="178.0" x2="78"  y2="140"/>
    <line x1="23.8"  y1="144.0" x2="60"  y2="122"/>
    <line x1="12.0"  y1="100.0" x2="62"  y2="100"/>
    <line x1="23.8"  y1="56.0"  x2="60"  y2="78"/>
    <line x1="56.0"  y1="22.0"  x2="78"  y2="60"/>
  </g>

  <!--
    4 asas em pinwheel — 1 asa base rotacionada 90°, 180°, 270°.
    A asa parte de perto do centro-topo, varre para fora/direita
    e retorna ao centro-direita, criando a forma de "folha curvada".
  -->
  <path id="wing"
    d="M 100,62
       C 106,48  130,38  152,52
       C 140,46  122,50  114,64
       C 134,56  144,70  140,90
       C 134,76  120,68  100,68
       Z"
    fill="url(#blade)" opacity="0.9"/>
  <use href="#wing" transform="rotate(90 100 100)"  opacity="0.9"/>
  <use href="#wing" transform="rotate(180 100 100)" opacity="0.9"/>
  <use href="#wing" transform="rotate(270 100 100)" opacity="0.9"/>

  <!-- Nós de conexão internos (onde as linhas chegam) -->
  <g fill="none" stroke="#0ab5bd" stroke-width="1.1" opacity="0.5">
    <circle cx="100" cy="62"  r="3.2"/>
    <circle cx="138" cy="100" r="3.2"/>
    <circle cx="100" cy="138" r="3.2"/>
    <circle cx="62"  cy="100" r="3.2"/>
  </g>

  <!-- Halo -->
  <circle cx="100" cy="100" r="36" fill="url(#glow)"/>

  <!-- Esfera central -->
  <circle cx="100" cy="100" r="21" fill="url(#sphere)"/>
  <!-- Highlight -->
  <ellipse cx="93" cy="93" rx="7.5" ry="5" fill="white" opacity="0.24"/>
</svg>
