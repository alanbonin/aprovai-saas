    <circle cx="100" cy="188" r="4.5" fill="#0ab5bd"/>
    <circle cx="38"  cy="162" r="4.5" fill="#0ab5bd"/>
    <circle cx="12"  cy="100" r="4.5" fill="#0ab5bd"/>
